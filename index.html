<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programma di sala</title>

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: system-ui, sans-serif;
      color: white;
    }

    header {
      text-align: center;
      padding: 18px 12px;
      font-size: 18px;
      font-weight: 600;
    }

    .programma {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 0 0 30px;
    }

    .pagina img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      text-align: center;
      font-size: 13px;
      color: #aaa;
      padding: 20px;
    }
  </style>
</head>

<body>
  <header>Programma di sala</header>

  <main class="programma">
    <section class="pagina"><img src="immagini/01.png" alt="Pagina 1"></section>
    <section class="pagina"><img src="immagini/02.png" alt="Pagina 2"></section>
    <section class="pagina"><img src="immagini/03.png" alt="Pagina 3"></section>
  </main>

  <footer>Scorri per consultare il programma</footer>
</body>
</html>
